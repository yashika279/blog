<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Articles</title>
</head>
<body>

<h1>Articles List</h1>

<ul>
    <li th:each="article : ${articles}">
        <span th:text="${article.title}"></span> -
        <span th:text="${article.content}"></span>
    </li>
</ul>

</body>
</html>
